<!doctype html>
<html>
  <head>
    <title>Student Exam Performance Predictor</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: white;
        width: 500px;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
      }

      h2 {
        text-align: center;
        margin-top: 20px;
        color: #333;
      }

      label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
      }

      select,
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      select:focus,
      input:focus {
        outline: none;
        border: 1px solid #667eea;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #667eea;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background-color: #5a67d8;
      }

      .result {
        margin-top: 20px;
        padding: 10px;
        background-color: #f3f4f6;
        border-radius: 8px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #444;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Student Exam Performance Indicator</h1>

      <form action="{{ url_for('predict_datapoint') }}" method="post">
        <label>Gender</label>
        <select name="gender" required>
          <option disabled selected value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <label>Race or Ethnicity</label>
        <select name="ethnicity" required>
          <option disabled selected value="">Select Ethnicity</option>
          <option value="group A">Group A</option>
          <option value="group B">Group B</option>
          <option value="group C">Group C</option>
          <option value="group D">Group D</option>
          <option value="group E">Group E</option>
        </select>

        <label>Parental Level of Education</label>
        <select name="parental_level_of_education" required>
          <option disabled selected value="">Select Parent Education</option>
          <option value="associate's degree">Associate's Degree</option>
          <option value="bachelor's degree">Bachelor's Degree</option>
          <option value="high school">High School</option>
          <option value="master's degree">Master's Degree</option>
          <option value="some college">Some College</option>
          <option value="some high school">Some High School</option>
        </select>

        <label>Lunch Type</label>
        <select name="lunch" required>
          <option disabled selected value="">Select Lunch Type</option>
          <option value="free/reduced">Free / Reduced</option>
          <option value="standard">Standard</option>
        </select>

        <label>Test Preparation Course</label>
        <select name="test_preparation_course" required>
          <option disabled selected value="">Select Course</option>
          <option value="none">None</option>
          <option value="completed">Completed</option>
        </select>

        <label>Reading Score (0–100)</label>
        <input type="number" name="reading_score" min="0" max="100" required />

        <label>Writing Score (0–100)</label>
        <input type="number" name="writing_score" min="0" max="100" required />

        <button type="submit">Predict Math Score</button>
      </form>

      {% if results %}
      <div class="result">Predicted Math Score: {{ results }}</div>
      {% endif %}
    </div>
  </body>
</html>
